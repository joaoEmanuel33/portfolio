<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racer Portfólio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Inter', sans-serif; background: #111; user-select: none; }

        /* UI DO JOGO */
        #game-ui { position: absolute; top: 20px; left: 20px; color: #fff; font-family: 'Orbitron', sans-serif; z-index: 10; text-shadow: 0 0 10px #000; display: none; }
        .timer-box { font-size: 2rem; margin-bottom: 5px; }
        .target-time { color: #ffeb3b; font-size: 1.1rem; font-weight: bold; }
        
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 200px; height: 200px; background: rgba(0,0,0,0.6); border: 2px solid #555; border-radius: 10px; z-index: 10; display: none; overflow: hidden;}
        #minimap { width: 100%; height: 100%; display: block; }

        #telemetry { position: absolute; bottom: 30px; right: 30px; text-align: right; color: #fff; font-family: 'Orbitron', sans-serif; z-index: 10; display: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 2px solid #555; }
        #speed-display { font-size: 3rem; font-weight: bold; color: #0ff; text-shadow: 0 0 10px #0ff; }
        
        .status-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 5px; }
        #gear-display { font-size: 2rem; color: #ffeb3b; font-weight: bold;}
        .indicator { font-size: 1.2rem; color: #555; font-weight: bold; border: 2px solid #555; padding: 2px 8px; border-radius: 5px; transition: 0.2s;}
        
        .drs-active { color: #0f0 !important; border-color: #0f0 !important; text-shadow: 0 0 10px #0f0; box-shadow: 0 0 5px #0f0; }
        .slip-active { color: #00e5ff !important; border-color: #00e5ff !important; text-shadow: 0 0 10px #00e5ff; box-shadow: 0 0 5px #00e5ff; }

        #damage-bar-container { width: 150px; height: 10px; background: #333; margin-top: 10px; margin-left: auto; border-radius: 5px; overflow: hidden; }
        #damage-bar { width: 100%; height: 100%; background: #00ff00; transition: 0.2s; }

        #instructions { position: absolute; bottom: 30px; left: 30px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-shadow: 0 2px 5px #000; display: none; }
        .highlight { color: #ffeb3b; font-weight: bold; }
        
        /* MENU DA GARAGEM */
        #garage-menu { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Orbitron', sans-serif; overflow-y: auto; padding: 20px;}
        h1 { font-size: 2.5rem; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 20px; }
        .section-title { margin-top: 20px; margin-bottom: 10px; color: #ffeb3b; }
        
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; max-width: 700px; width: 100%;}
        .btn-select { padding: 12px; border: 2px solid #555; background: #222; color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .btn-select:hover { border-color: #0ff; }
        .btn-select.active { border-color: #ffeb3b; background: #333; box-shadow: 0 0 10px rgba(255, 235, 59, 0.5); }
        
        #start-race-btn { margin-top: 20px; padding: 15px 40px; font-size: 1.5rem; background: #0ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: bold; }
        #countdown-ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: #ffeb3b; font-family: 'Orbitron', sans-serif; font-weight: bold; text-shadow: 0 0 30px #ffeb3b; z-index: 150; display: none; }

        #portfolio-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 10, 15, 0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Orbitron', sans-serif;}
        .msg { font-size: 2rem; margin-bottom: 20px; text-shadow: 0 0 15px #0ff; text-align: center;}
        #restart-btn { background: #ff0055; color: #fff; border: none; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="garage-menu">
        <h1>Simulador Pro V4.1</h1>
        
        <div class="section-title">Selecione o Circuito</div>
        <div class="grid-container" id="track-grid">
            <button class="btn-select active" onclick="selectTrack(this, 'interlagos')">Interlagos ☀️</button>
            <button class="btn-select" onclick="selectTrack(this, 'singapore')">Cingapura 🌙</button>
            <button class="btn-select" onclick="selectTrack(this, 'monza')">Monza 🏎️</button>
            <button class="btn-select" onclick="selectTrack(this, 'monaco')">Mônaco 🏙️</button>
        </div>

        <div class="section-title">Assine com uma Equipe</div>
        <div class="grid-container" id="team-grid">
            <button class="btn-select active" onclick="selectColor(this, 0xff6600, 0x111111)">Maclata</button>
            <button class="btn-select" onclick="selectColor(this, 0x0055ff, 0x111111)">RedBurro</button>
            <button class="btn-select" onclick="selectColor(this, 0xaaaaaa, 0x111111)">MecaBenz</button>
            <button class="btn-select" onclick="selectColor(this, 0xcc0000, 0x111111)">Ferrado</button>
            <button class="btn-select" onclick="selectColor(this, 0xffffff, 0x0055ff)">BullsRacing</button>
            <button class="btn-select" onclick="selectColor(this, 0xff1493, 0x0055ff)">Alpistes</button>
            <button class="btn-select" onclick="selectColor(this, 0x00ff00, 0x111111)">F. Martin</button>
            <button class="btn-select" onclick="selectColor(this, 0xaaaaaa, 0xcc0000)">Haudi</button>
            <button class="btn-select" onclick="selectColor(this, 0x111111, 0xffffff)">Raas</button>
        </div>
        <button id="start-race-btn" onclick="startCountdown()">Ir para o Grid</button>
    </div>

    <div id="countdown-ui">3</div>

    <div id="game-ui">
        <div class="timer-box">Tempo: <span id="current-time">0.00</span>s</div>
        <div class="target-time">Meta: 1 Volta</div>
    </div>
    
    <div id="minimap-container"><canvas id="minimap" width="200" height="200"></canvas></div>

    <div id="telemetry">
        <div class="status-row">
            <div class="indicator" id="slip-indicator">VÁCUO</div>
            <div class="indicator" id="drs-indicator">DRS</div>
            <div id="gear-display">N</div>
        </div>
        <div id="speed-display">0 km/h</div>
        <div id="damage-bar-container"><div id="damage-bar"></div></div>
        <div style="font-size: 0.8rem; margin-top:5px;">SAÚDE DO CARRO</div>
    </div>

    <div id="instructions">Setas/WASD: Acelerar | <span class="highlight">Espaço</span>: DRS | <span class="highlight">C</span>: Câmera</div>

    <div id="portfolio-overlay">
        <h2 class="msg" id="win-message"></h2>
        <button id="restart-btn" onclick="location.reload()">Voltar para a Garagem</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- CONFIGURAÇÕES GERAIS ---
        let gameActive = false, raceStarted = false;
        let playerPrimaryColor = 0xff6600, playerSecondaryColor = 0x111111;
        let currentTrack = 'interlagos';
        let carHealth = 100;
        let speed = 0, steering = 0, targetSteering = 0; // targetSteering adicionado para suavização
        let gear = 0, rpm = 0;
        let cameraMode = 0; 
        let drsActive = false;
        let slipstreamActive = false;

        // --- SISTEMA DE ÁUDIO ---
        let audioCtx, engineOsc, gainNode;
        function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator(); engineOsc.type = 'sawtooth';
            gainNode = audioCtx.createGain(); gainNode.gain.value = 0;
            let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1500;
            engineOsc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            engineOsc.start();
        }

        function updateEngineSound() {
            if(!audioCtx || carHealth <= 0) return;
            let absSpeed = Math.abs(speed); 
            
            let targetGear = 1;
            if(absSpeed > 1.5) targetGear = 2; if(absSpeed > 3.0) targetGear = 3;
            if(absSpeed > 5.0) targetGear = 4; if(absSpeed > 7.5) targetGear = 5;
            if(absSpeed > 10.0) targetGear = 6; if(absSpeed > 12.5) targetGear = 7;
            if(speed < -0.1) targetGear = -1; if(absSpeed < 0.1) targetGear = 0;

            let maxV = [0, 1.5, 3.0, 5.0, 7.5, 10.0, 12.5, 15.5][targetGear > 0 ? targetGear : 0];
            let minV = [0, 0.0, 1.5, 3.0, 5.0, 7.5, 10.0, 12.5][targetGear > 0 ? targetGear : 0];
            
            let normalizedRPM = targetGear > 0 ? ((absSpeed - minV) / (maxV - minV)) : (absSpeed / 2);
            if(targetGear === 0) normalizedRPM = 0.1;

            if(gear !== targetGear && targetGear > 0) { gear = targetGear; rpm = 0.4; } 
            else { rpm += (normalizedRPM - rpm) * 0.2; }

            document.getElementById('gear-display').innerText = gear === 0 ? 'N' : gear === -1 ? 'R' : gear;
            engineOsc.frequency.setTargetAtTime(60 + (rpm * 350), audioCtx.currentTime, 0.1); 
            gainNode.gain.setTargetAtTime(0.05 + (rpm * 0.1), audioCtx.currentTime, 0.1);
        }

        // --- SETUP 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 30000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;

        let ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        let dirLight = new THREE.DirectionalLight(0xffffff, 0.9); dirLight.position.set(2000, 3000, 2000); dirLight.castShadow = true; scene.add(dirLight);

        let trackGroup = new THREE.Group();
        scene.add(trackGroup);

        // --- GERADOR DE PISTAS ---
        let trackCurve, logicPoints, roadWidth = 100;
        let mapMinX = 0, mapMaxX = 0, mapMinZ = 0, mapMaxZ = 0; 

        function buildTrackEnvironment() {
            scene.remove(trackGroup); trackGroup = new THREE.Group(); scene.add(trackGroup);
            let scale = 3.5; let pts = []; roadWidth = 100;

            if(currentTrack === 'interlagos') {
                scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.FogExp2(0x87CEEB, 0.00010);
                ambientLight.intensity = 0.7; dirLight.intensity = 1.0;
                pts = [ new THREE.Vector3(0,30,800), new THREE.Vector3(-300,-10,300), new THREE.Vector3(-600,0,-100), new THREE.Vector3(-800,10,-600), new THREE.Vector3(-200,0,-900), new THREE.Vector3(500,-10,-500), new THREE.Vector3(700,0,100), new THREE.Vector3(300,15,500) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x2e4f3a }));
                ground.rotation.x = -Math.PI / 2; ground.position.y = -50; 
                trackGroup.add(ground);
            } 
            else if (currentTrack === 'singapore') {
                scene.background = new THREE.Color(0x020205); scene.fog = new THREE.FogExp2(0x020205, 0.00025);
                ambientLight.intensity = 0.2; dirLight.intensity = 0.2; roadWidth = 85;
                pts = [ new THREE.Vector3(0,0,600), new THREE.Vector3(-500,0,600), new THREE.Vector3(-500,0,100), new THREE.Vector3(-800,0,-200), new THREE.Vector3(-800,0,-800), new THREE.Vector3(0,0,-800), new THREE.Vector3(500,0,-400), new THREE.Vector3(500,0,200) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x111111 }));
                ground.rotation.x = -Math.PI / 2; ground.position.y = -5;
                trackGroup.add(ground);
            }
            else if (currentTrack === 'monza') {
                scene.background = new THREE.Color(0x7ec0ee); scene.fog = new THREE.FogExp2(0x7ec0ee, 0.00008);
                ambientLight.intensity = 0.8; dirLight.intensity = 1.0;
                pts = [ new THREE.Vector3(0,0,1500), new THREE.Vector3(-200,0,500), new THREE.Vector3(-200,0,-800), new THREE.Vector3(0,0,-1500), new THREE.Vector3(400,0,-1500), new THREE.Vector3(500,0,-500), new THREE.Vector3(500,0,800), new THREE.Vector3(300,0,1500) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x3a5f2e }));
                ground.rotation.x = -Math.PI / 2; ground.position.y = -5;
                trackGroup.add(ground);
            }
            else if (currentTrack === 'monaco') {
                scene.background = new THREE.Color(0x99ccff); scene.fog = new THREE.FogExp2(0x99ccff, 0.00015);
                ambientLight.intensity = 0.8; dirLight.intensity = 0.6; roadWidth = 65;
                pts = [ new THREE.Vector3(0,0,400), new THREE.Vector3(-250,0,250), new THREE.Vector3(-400,15,0), new THREE.Vector3(-200,5,-300), new THREE.Vector3(200,0,-300), new THREE.Vector3(400,0,0), new THREE.Vector3(200,0,300) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x555555 }));
                ground.rotation.x = -Math.PI / 2; ground.position.y = -10; 
                trackGroup.add(ground);
                let water = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshLambertMaterial({ color: 0x0066aa }));
                water.rotation.x = -Math.PI / 2; water.position.set(1000, -15, 500); 
                trackGroup.add(water);
            }

            pts = pts.map(p => p.multiplyScalar(scale));
            trackCurve = new THREE.CatmullRomCurve3(pts, true);
            logicPoints = trackCurve.getSpacedPoints(1200);

            mapMinX = Infinity; mapMaxX = -Infinity; mapMinZ = Infinity; mapMaxZ = -Infinity;
            logicPoints.forEach(p => {
                if(p.x < mapMinX) mapMinX = p.x; if(p.x > mapMaxX) mapMaxX = p.x;
                if(p.z < mapMinZ) mapMinZ = p.z; if(p.z > mapMaxZ) mapMaxZ = p.z;
            });

            const asphaltMat = new THREE.MeshPhongMaterial({ color: 0x222222, side: THREE.DoubleSide });
            const segments = 1200;
            const geo = new THREE.BufferGeometry(); const verts = [], indices = [];
            for(let i=0; i<segments; i++) {
                const pt = logicPoints[i]; const tangent = trackCurve.getTangentAt(i/segments);
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                verts.push(pt.x + normal.x * roadWidth, pt.y, pt.z + normal.z * roadWidth);
                verts.push(pt.x - normal.x * roadWidth, pt.y, pt.z - normal.z * roadWidth);
            }
            for(let i=0; i<segments; i++) {
                const a = i * 2, b = i * 2 + 1, c = ((i + 1) % segments) * 2, d = ((i + 1) % segments) * 2 + 1;
                indices.push(a, b, d); indices.push(a, d, c);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3)); geo.setIndex(indices); geo.computeVertexNormals();
            let roadMesh = new THREE.Mesh(geo, asphaltMat); roadMesh.receiveShadow = true; trackGroup.add(roadMesh);

            // Decorações
            if(currentTrack === 'monaco') {
                let tunnelGeo = new THREE.CylinderGeometry(roadWidth + 40, roadWidth + 40, 1500, 16, 1, true, 0, Math.PI);
                let tunnelMat = new THREE.MeshPhongMaterial({color: 0x111111, side: THREE.DoubleSide});
                let tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
                tunnel.rotation.z = Math.PI / 2; tunnel.position.copy(trackCurve.getPointAt(0.55));
                tunnel.lookAt(trackCurve.getPointAt(0.56)); trackGroup.add(tunnel);
            }
            if(currentTrack === 'singapore') {
                for(let i=0; i<1000; i+=40) {
                    const pt = logicPoints[i]; const tangent = trackCurve.getTangentAt(i/1200);
                    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                    if(i % 80 === 0) {
                        let light = new THREE.PointLight(0xfff5b6, 1.2, 800); 
                        light.position.set(pt.x + normal.x * roadWidth, pt.y + 150, pt.z + normal.z * roadWidth);
                        trackGroup.add(light);
                    }
                    if(i % 120 === 0) {
                        let h = 300 + Math.random() * 800;
                        let building = new THREE.Mesh(new THREE.BoxGeometry(150, h, 150), new THREE.MeshPhongMaterial({color: 0x050505, emissive: 0x223344, emissiveIntensity: Math.random()}));
                        let n = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize().multiplyScalar(300 + Math.random()*200);
                        building.position.set(pt.x + n.x, h/2 - 20, pt.z + n.z);
                        trackGroup.add(building);
                    }
                }
            }
            if(currentTrack === 'monza' || currentTrack === 'interlagos') {
                const trunkGeo = new THREE.CylinderGeometry(15, 20, 80);
                const leavesGeo = new THREE.ConeGeometry(80, 200, 8);
                const trunkMat = new THREE.MeshLambertMaterial({color: 0x3d2817});
                const leavesMat = new THREE.MeshLambertMaterial({color: currentTrack==='monza'?0x1a3a22:0x2d5a27});
                
                for(let i=0; i<400; i++) {
                    let pt = logicPoints[Math.floor(Math.random() * logicPoints.length)];
                    let n = new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize().multiplyScalar(roadWidth + 200 + Math.random() * 600);
                    let tree = new THREE.Group();
                    let t = new THREE.Mesh(trunkGeo, trunkMat); t.position.y = 40;
                    let l = new THREE.Mesh(leavesGeo, leavesMat); l.position.y = 140;
                    tree.add(t, l); tree.position.set(pt.x + n.x, pt.y - 10, pt.z + n.z);
                    trackGroup.add(tree);
                }
            }
        }

        // --- CONSTRUTOR DE CARROS ---
        function createCarModel(primary, secondary) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: primary });
            const wingMat = new THREE.MeshPhongMaterial({ color: secondary }); 
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

            const chassis = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 10), bodyMat); chassis.position.y = 1.2; chassis.castShadow = true;
            const nose = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), bodyMat); nose.position.set(0, 1.0, 7); nose.castShadow = true;
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.0, 4), blackMat); cockpit.position.set(0, 2.2, -1); cockpit.castShadow = true;
            const fWing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 2), wingMat); fWing.position.set(0, 0.6, 8.5); fWing.castShadow = true;
            
            const rWingGroup = new THREE.Group(); rWingGroup.position.set(0, 3.0, -4.5);
            const rWing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 2), wingMat); rWing.castShadow = true;
            rWingGroup.add(rWing);

            const wGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.2, 16); const wMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wRL = new THREE.Mesh(wGeo, wMat); wRL.rotation.z = Math.PI/2; wRL.position.set(-3.2, 1.5, -3.5); wRL.castShadow = true;
            const wRR = new THREE.Mesh(wGeo, wMat); wRR.rotation.z = Math.PI/2; wRR.position.set(3.2, 1.5, -3.5); wRR.castShadow = true;
            const fL_Pivot = new THREE.Group(); fL_Pivot.position.set(-3.2, 1.5, 5.5);
            const wFL = new THREE.Mesh(wGeo, wMat); wFL.rotation.z = Math.PI/2; fL_Pivot.add(wFL); wFL.castShadow = true;
            const fR_Pivot = new THREE.Group(); fR_Pivot.position.set(3.2, 1.5, 5.5);
            const wFR = new THREE.Mesh(wGeo, wMat); wFR.rotation.z = Math.PI/2; fR_Pivot.add(wFR); wFR.castShadow = true;

            group.add(chassis, nose, cockpit, fWing, rWingGroup, wRL, wRR, fL_Pivot, fR_Pivot); 
            return { group, rWing: rWing, pivotFL: fL_Pivot, pivotFR: fR_Pivot, wheelFL: wFL, wheelFR: wFR, wheelRL: wRL, wheelRR: wRR };
        }

        let playerCarData, playerCar; 
        let aiCars = [];
        const aiLiveries = [ { p: 0x0055ff, s: 0x111111 }, { p: 0xaaaaaa, s: 0x111111 }, { p: 0xcc0000, s: 0x111111 }, { p: 0xffffff, s: 0x0055ff }, { p: 0xff1493, s: 0x0055ff }, { p: 0x00ff00, s: 0x111111 }, { p: 0xaaaaaa, s: 0xcc0000 }, { p: 0xffffff, s: 0x111111 }, { p: 0x111111, s: 0xffffff } ];

        function initCars() {
            if(playerCar) scene.remove(playerCar); 
            aiCars.forEach(ai => scene.remove(ai.mesh)); aiCars = [];

            playerCarData = createCarModel(playerPrimaryColor, playerSecondaryColor); playerCar = playerCarData.group;
            
            const playerStart = 0.960;
            const pt = trackCurve.getPointAt(playerStart); const tg = trackCurve.getTangentAt(playerStart);
            playerCar.position.copy(pt); playerCar.position.y = pt.y + 1.5; playerCar.rotation.y = Math.atan2(tg.x, tg.z);
            scene.add(playerCar);

            for(let i=0; i<9; i++) {
                const aiData = createCarModel(aiLiveries[i].p, aiLiveries[i].s); 
                let progress = 0.995 - (i * 0.007); if(progress < 0) progress += 1;
                const offset = (i % 2 === 0) ? 15 : -15; 
                const p = trackCurve.getPointAt(progress); const t = trackCurve.getTangentAt(progress);
                const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                
                aiData.group.position.copy(p).add(n.multiplyScalar(offset)); aiData.group.position.y = p.y + 1.5; aiData.group.rotation.y = Math.atan2(t.x, t.z);
                scene.add(aiData.group);
                aiCars.push({ data: aiData, mesh: aiData.group, progress: progress, speed: 0.00035 + Math.random()*0.00005, offset: offset });
            }
        }

        // --- RENDERIZADOR DO MINIMAPA ---
        const minimapCtx = document.getElementById('minimap').getContext('2d');
        function drawMinimap() {
            minimapCtx.clearRect(0, 0, 200, 200);
            let w = mapMaxX - mapMinX; let h = mapMaxZ - mapMinZ;
            let size = Math.max(w, h); let scale = 160 / size;
            let cx = mapMinX + w/2; let cz = mapMinZ + h/2;

            function toMapX(x) { return 100 + (x - cx) * scale; }
            function toMapY(z) { return 100 + (z - cz) * scale; }

            minimapCtx.beginPath();
            minimapCtx.strokeStyle = '#555'; minimapCtx.lineWidth = 6;
            for(let i=0; i<logicPoints.length; i++) {
                let x = toMapX(logicPoints[i].x); let y = toMapY(logicPoints[i].z);
                if(i===0) minimapCtx.moveTo(x, y); else minimapCtx.lineTo(x, y);
            }
            minimapCtx.closePath(); minimapCtx.stroke();

            minimapCtx.fillStyle = '#ff0000';
            aiCars.forEach(ai => {
                minimapCtx.beginPath();
                minimapCtx.arc(toMapX(ai.mesh.position.x), toMapY(ai.mesh.position.z), 3, 0, Math.PI*2);
                minimapCtx.fill();
            });

            minimapCtx.fillStyle = '#00ff00';
            minimapCtx.beginPath();
            minimapCtx.arc(toMapX(playerCar.position.x), toMapY(playerCar.position.z), 4, 0, Math.PI*2);
            minimapCtx.fill();
        }

        // --- UI E CONTROLES ---
        function selectTrack(btn, trackName) {
            document.querySelectorAll('#track-grid .btn-select').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentTrack = trackName;
        }

        function selectColor(btn, primary, secondary) { 
            document.querySelectorAll('#team-grid .btn-select').forEach(b => b.classList.remove('active')); 
            btn.classList.add('active'); playerPrimaryColor = primary; playerSecondaryColor = secondary; 
        }
        
        function startCountdown() {
            document.getElementById('garage-menu').style.display = 'none'; 
            document.getElementById('game-ui').style.display = 'block'; 
            document.getElementById('minimap-container').style.display = 'block'; 
            document.getElementById('telemetry').style.display = 'block'; 
            document.getElementById('instructions').style.display = 'block'; 
            
            buildTrackEnvironment(); initCars(); initAudio(); 

            const countUI = document.getElementById('countdown-ui'); countUI.style.display = 'block';
            camera.position.set(playerCar.position.x, playerCar.position.y + 15, playerCar.position.z - 45);
            camera.lookAt(playerCar.position);

            let count = 3; countUI.innerText = count;
            let interval = setInterval(() => {
                count--;
                if(count > 0) countUI.innerText = count;
                else if(count === 0) { countUI.innerText = "GO!"; lapStartTime = Date.now(); raceStarted = true; } 
                else { clearInterval(interval); countUI.style.display = 'none'; }
            }, 1000); 
            gameActive = true; 
        }

        const keys = {};
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'KeyC') cameraMode = cameraMode === 0 ? 1 : 0; 
            if(e.code === 'Space') { drsActive = true; document.getElementById('drs-indicator').classList.add('drs-active'); if(playerCarData) playerCarData.rWing.rotation.x = -Math.PI / 4; }
        });
        
        document.addEventListener('keyup', (e) => { 
            keys[e.code] = false;
            if(e.code === 'Space') { drsActive = false; document.getElementById('drs-indicator').classList.remove('drs-active'); if(playerCarData) playerCarData.rWing.rotation.x = 0; }
        });

        function updateDamage(amount) {
            carHealth -= amount; if(carHealth < 0) carHealth = 0;
            let bar = document.getElementById('damage-bar'); bar.style.width = carHealth + '%';
            if(carHealth < 50) bar.style.background = '#ffaa00';
            if(carHealth < 20) bar.style.background = '#ff0000';
            if(carHealth <= 0) endGame("CARRO DESTRUÍDO!", false);
        }

        function endGame(msg, success) {
            raceStarted = false; gameActive = false;
            if(audioCtx) audioCtx.suspend(); 
            document.getElementById('win-message').innerText = msg;
            document.getElementById('win-message').style.color = success ? '#0ff' : '#ff0000';
            document.getElementById('portfolio-overlay').style.display = 'flex';
        }

        let lapStartTime = 0; let passedHalfway = false;

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) { renderer.render(scene, camera); return; }

            updateEngineSound();
            let angle = playerCar.rotation.y;

            if (raceStarted && carHealth > 0) {
                
                slipstreamActive = false;
                let playerDir = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)).normalize();

                aiCars.forEach(ai => {
                    ai.progress += ai.speed; if(ai.progress > 1) ai.progress -= 1; 
                    const pt = trackCurve.getPointAt(ai.progress); const t = trackCurve.getTangentAt(ai.progress); const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                    ai.mesh.position.copy(pt).add(n.multiplyScalar(ai.offset)); ai.mesh.position.y = pt.y + 1.5; ai.mesh.rotation.y = Math.atan2(t.x, t.z);
                    
                    ai.data.wheelFL.rotation.x += ai.speed * 1000; ai.data.wheelFR.rotation.x += ai.speed * 1000;
                    ai.data.wheelRL.rotation.x += ai.speed * 1000; ai.data.wheelRR.rotation.x += ai.speed * 1000;

                    let dist = playerCar.position.distanceTo(ai.mesh.position);
                    if(dist < 10) { 
                        speed *= -0.3; playerCar.position.x -= Math.sin(angle) * 5; playerCar.position.z -= Math.cos(angle) * 5; updateDamage(10); 
                    }
                    if(dist > 15 && dist < 120 && speed > 5) {
                        let dirToAi = new THREE.Vector3().subVectors(ai.mesh.position, playerCar.position).normalize();
                        if(dirToAi.dot(playerDir) > 0.95) slipstreamActive = true; 
                    }
                });

                let slipUI = document.getElementById('slip-indicator');
                if(slipstreamActive) slipUI.classList.add('slip-active'); else slipUI.classList.remove('slip-active');

                // FÍSICA E SUAVIZAÇÃO DE DIREÇÃO
                let accel = 0; let accelForce = drsActive ? 0.32 : 0.25; 
                if (keys['ArrowUp'] || keys['KeyW']) accel = accelForce; 
                if (keys['ArrowDown'] || keys['KeyS']) accel = -0.30; 
                
                // Lógica nova de direção (targetSteering substitui a mudança abrupta do steering)
                if (keys['ArrowLeft'] || keys['KeyA']) targetSteering = 1; 
                else if (keys['ArrowRight'] || keys['KeyD']) targetSteering = -1; 
                else targetSteering = 0;
                
                // Interpolação suave: o steering "persegue" o targetSteering aos poucos
                steering += (targetSteering - steering) * 0.12; 
                
                playerCarData.pivotFL.rotation.y = steering * 0.4; 
                playerCarData.pivotFR.rotation.y = steering * 0.4;
                
                speed += accel; 
                let drag = 0.98;
                if(drsActive) drag = 0.99; 
                if(slipstreamActive) drag = 0.995; 
                speed *= drag; 
                
                let maxPlayerSpeed = (drsActive ? 15.0 : 12.0) * (carHealth / 100); 
                if(slipstreamActive) maxPlayerSpeed += 1.5; 
                if(maxPlayerSpeed < 2) maxPlayerSpeed = 2; 
                
                speed = Math.max(-3, Math.min(maxPlayerSpeed, speed)); 
                
                // Reduzi a taxa de conversão do ângulo para deixar o carro mais estável
                let steeringEfficiency = drsActive ? 0.016 : 0.024;
                if(Math.abs(speed) > 0.1) angle += steering * steeringEfficiency * (speed > 0 ? 1 : -1);
                
                let wheelRotSpeed = speed * 0.3;
                playerCarData.wheelFL.rotation.x += wheelRotSpeed; playerCarData.wheelFR.rotation.x += wheelRotSpeed;
                playerCarData.wheelRL.rotation.x += wheelRotSpeed; playerCarData.wheelRR.rotation.x += wheelRotSpeed;

                document.getElementById('speed-display').innerText = Math.abs(Math.floor(speed * 25)) + ' km/h';

                // Limites
                let nextX = playerCar.position.x + Math.sin(angle) * speed; let nextZ = playerCar.position.z + Math.cos(angle) * speed;
                let minDist = Infinity; let closestIdx = 0;
                for(let i = 0; i < logicPoints.length; i+=5) { 
                    let dx = logicPoints[i].x - nextX; let dz = logicPoints[i].z - nextZ; let sq = dx*dx + dz*dz; 
                    if(sq < minDist) { minDist = sq; closestIdx = i; } 
                }
                let distToCenter = Math.sqrt(minDist);
                
                if (distToCenter > roadWidth + 10) { 
                    speed *= 0.85; 
                    if(distToCenter > roadWidth + 20 && currentTrack === 'monaco') { speed *= -0.5; updateDamage(5); }
                } 
                
                playerCar.position.x = nextX; playerCar.position.z = nextZ;
                playerCar.position.y = logicPoints[closestIdx].y + 1.5; 
                playerCar.rotation.y = angle;
                
                let pTangent = trackCurve.getTangentAt(closestIdx / 1200);
                playerCar.rotation.x = -Math.atan2(pTangent.y, Math.sqrt(pTangent.x*pTangent.x + pTangent.z*pTangent.z));

                let currentTime = (Date.now() - lapStartTime) / 1000; 
                document.getElementById('current-time').textContent = currentTime.toFixed(2);
                if (closestIdx > 500 && closestIdx < 700) passedHalfway = true; 
                if (passedHalfway && closestIdx < 20) { endGame(`VITÓRIA! Tempo: ${currentTime.toFixed(2)}s`, true); }

                drawMinimap();
            }

            playerCar.updateMatrixWorld(true);
            if (cameraMode === 1) { 
                const localPos = new THREE.Vector3(0, 4.0, 0.0); camera.position.copy(localPos.applyMatrix4(playerCar.matrixWorld));
                const localLook = new THREE.Vector3(0, 1.8, 50); camera.lookAt(localLook.applyMatrix4(playerCar.matrixWorld));
            } else { 
                const offset = new THREE.Vector3(0, 15, -45).applyMatrix4(new THREE.Matrix4().makeRotationY(angle)).add(playerCar.position);
                camera.position.lerp(offset, 0.2); camera.lookAt(playerCar.position);
            }

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
    </script>
</body>
</html>
