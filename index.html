<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Coder | Simulador Pro V8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Inter', sans-serif; background: #111; user-select: none; }

        #game-ui { position: absolute; top: 20px; left: 20px; color: #fff; font-family: 'Orbitron', sans-serif; z-index: 10; text-shadow: 0 0 10px #000; display: none; }
        .timer-box { font-size: 2.5rem; margin-bottom: 5px; color: #0f0; }
        
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 200px; height: 200px; background: rgba(0,0,0,0.6); border: 2px solid #555; border-radius: 10px; z-index: 10; display: none; overflow: hidden;}
        #minimap { width: 100%; height: 100%; display: block; }

        #telemetry { position: absolute; bottom: 30px; right: 30px; text-align: right; color: #fff; font-family: 'Orbitron', sans-serif; z-index: 10; display: none; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 2px solid #555; }
        #speed-display { font-size: 3.5rem; font-weight: bold; color: #0ff; text-shadow: 0 0 10px #0ff; }
        
        .status-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 5px; }
        #gear-display { font-size: 2.5rem; color: #ffeb3b; font-weight: bold;}
        .indicator { font-size: 1.2rem; color: #555; font-weight: bold; border: 2px solid #555; padding: 2px 8px; border-radius: 5px; transition: 0.2s;}
        
        .drs-active { color: #0f0 !important; border-color: #0f0 !important; text-shadow: 0 0 10px #0f0; box-shadow: 0 0 5px #0f0; }

        #instructions { position: absolute; bottom: 30px; left: 30px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-shadow: 0 2px 5px #000; display: none; }
        .highlight { color: #ffeb3b; font-weight: bold; }
        
        #garage-menu { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-family: 'Orbitron', sans-serif; overflow-y: auto; padding: 20px;}
        h1 { font-size: 3rem; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 20px; }
        .section-title { margin-top: 20px; margin-bottom: 10px; color: #ffeb3b; }
        
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; max-width: 600px; width: 100%;}
        .btn-select { padding: 15px; border: 3px solid #555; background: #222; color: #fff; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.1rem; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .btn-select:hover { border-color: #0ff; background: #333; }
        .btn-select.active { border-color: #ffeb3b; background: #444; box-shadow: 0 0 15px rgba(255, 235, 59, 0.5); }
        
        #start-race-btn { margin-top: 25px; padding: 20px 50px; font-size: 1.8rem; background: #0ff; color: #000; border: none; border-radius: 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: bold; transition: 0.3s; }
        #start-race-btn:hover { background: #fff; transform: scale(1.05); }
        #countdown-ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; color: #ffeb3b; font-family: 'Orbitron', sans-serif; font-weight: bold; text-shadow: 0 0 40px #ffeb3b; z-index: 150; display: none; }
        
        #game-messages { position: fixed; top: 120px; left: 50%; transform: translateX(-50%); text-align: center; font-family: 'Orbitron', sans-serif; font-weight: bold; z-index: 50; }
        .game-msg { font-size: 2.2rem; display: none; text-shadow: 0 0 10px #000; padding: 10px; border-radius: 8px; }
        #off-track-warning { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        #lap-complete-msg { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
    </style>
</head>
<body>

    <div id="garage-menu">
        <h1>Simulador Pro V8</h1>
        <div class="section-title">Selecione o Circuito</div>
        <div class="grid-container" id="track-grid">
            <button class="btn-select active" onclick="selectTrack(this, 'interlagos')">Interlagos ☀️</button>
            <button class="btn-select" onclick="selectTrack(this, 'monza')">Monza 🏎️</button>
        </div>
        <div class="section-title">Assine com uma Equipe</div>
        <div class="grid-container" id="team-grid">
            <button class="btn-select active" onclick="selectColor(this, 0xff6600, 0x111111)">Maclata</button>
            <button class="btn-select" onclick="selectColor(this, 0xcc0000, 0x111111)">Ferrado</button>
            <button class="btn-select" onclick="selectColor(this, 0x0000aa, 0xffff00)">RedBurro</button>
            <button class="btn-select" onclick="selectColor(this, 0x00ffcc, 0xaaaaaa)">MecaBenz</button>
        </div>
        <button id="start-race-btn" onclick="startCountdown()">Ir para o Grid</button>
    </div>

    <div id="countdown-ui">3</div>
    <div id="game-ui"><div class="timer-box">Tempo: <span id="current-time">0.00</span>s</div></div>
    <div id="minimap-container"><canvas id="minimap" width="200" height="200"></canvas></div>

    <div id="game-messages">
        <div id="off-track-warning" class="game-msg">⚠️ FORA DA PISTA ⚠️</div>
        <div id="lap-complete-msg" class="game-msg">🏁 VOLTA COMPLETA! 🏁</div>
    </div>

    <div id="telemetry">
        <div class="status-row"><div class="indicator" id="drs-indicator">DRS</div><div id="gear-display">N</div></div>
        <div id="speed-display">0 km/h</div>
    </div>

    <div id="instructions">Setas/WASD: Acelerar | <span class="highlight">Espaço</span>: DRS | <span class="highlight">C</span>: Câmera</div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script>
        let gameActive = false, raceStarted = false;
        let playerPrimaryColor = 0xff6600, playerSecondaryColor = 0x111111;
        let currentTrack = 'interlagos';
        let speed = 0, steering = 0, targetSteering = 0, gear = 0;
        let cameraMode = 0, drsActive = false;
        let lapStartTime = 0;

        // --- SISTEMA DE ÁUDIO ---
        let engineAudio = new Audio('./assets/motor.mp3');
        engineAudio.loop = true; engineAudio.volume = 0.6;
        let audioCtx, engineOsc, gainNode, usingSynth = false;

        function initAudio() {
            engineAudio.play().catch(() => {
                console.log("MP3 não encontrado. Usando som matemático.");
                usingSynth = true;
                if(!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    engineOsc = audioCtx.createOscillator(); engineOsc.type = 'sawtooth';
                    gainNode = audioCtx.createGain(); gainNode.gain.value = 0;
                    let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1500;
                    engineOsc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
                    engineOsc.start();
                }
            });
        }

        function updateEngineSound() {
            let absSpeed = Math.abs(speed); 
            let targetGear = 1;
            if(absSpeed > 1.5) targetGear = 2; if(absSpeed > 3.0) targetGear = 3;
            if(absSpeed > 5.0) targetGear = 4; if(absSpeed > 7.5) targetGear = 5;
            if(absSpeed > 10.0) targetGear = 6; if(absSpeed > 12.5) targetGear = 7;
            if(speed < -0.1) targetGear = -1; if(absSpeed < 0.1) targetGear = 0;
            if(gear !== targetGear && targetGear > 0) gear = targetGear; 
            document.getElementById('gear-display').innerText = gear === 0 ? 'N' : gear === -1 ? 'R' : gear;

            let pitch = 0.5 + (absSpeed / 10);
            
            if(!usingSynth && !engineAudio.paused) {
                engineAudio.playbackRate = Math.max(0.5, Math.min(2.5, pitch));
            } else if(usingSynth && audioCtx) {
                engineOsc.frequency.setTargetAtTime(60 + (pitch * 150), audioCtx.currentTime, 0.1); 
                gainNode.gain.setTargetAtTime(0.05 + (pitch * 0.05), audioCtx.currentTime, 0.1);
            }
        }

        // --- SETUP 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 40000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;

        let ambientLight = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambientLight);
        let dirLight = new THREE.DirectionalLight(0xffffff, 1.0); dirLight.position.set(200, 400, 200); dirLight.castShadow = true; scene.add(dirLight);

        let trackGroup = new THREE.Group(); scene.add(trackGroup);
        let trackCurve, logicPoints, roadWidth = 100;

        // --- SISTEMA DE ÁRVORES INTELIGENTES ---
        function createTrees() {
            const quantidade = 150; const margem = roadWidth + 80; const tamanho = 6000; 
            const matTronco = new THREE.MeshLambertMaterial({ color: 0x5c4033 }); const matFolhas = new THREE.MeshLambertMaterial({ color: 0x228b22 });
            const geoTronco = new THREE.CylinderGeometry(5, 5, 40, 8); const geoFolhas = new THREE.ConeGeometry(25, 60, 8);

            for (let i = 0; i < quantidade; i++) {
                let x = (Math.random() - 0.5) * tamanho; let z = (Math.random() - 0.5) * tamanho;
                let pos = new THREE.Vector3(x, 0, z); let muitoPerto = false;
                
                for (let j = 0; j < logicPoints.length; j += 20) {
                    let dx = pos.x - logicPoints[j].x, dz = pos.z - logicPoints[j].z;
                    if (Math.sqrt(dx * dx + dz * dz) < margem) { muitoPerto = true; break; }
                }
                if (!muitoPerto) {
                    let arvore = new THREE.Group();
                    let tronco = new THREE.Mesh(geoTronco, matTronco); tronco.position.y = 20;
                    let folhas = new THREE.Mesh(geoFolhas, matFolhas); folhas.position.y = 60;
                    arvore.add(tronco); arvore.add(folhas);
                    arvore.position.set(x, -5, z); arvore.rotation.y = Math.random() * Math.PI; arvore.scale.setScalar(0.8 + Math.random() * 0.5);
                    trackGroup.add(arvore);
                }
            }
        }

        // --- CONSTRUTOR DE PISTAS, ZEBRAS E ÁREAS DE ESCAPE ---
        function buildTrackEnvironment() {
            scene.remove(trackGroup); trackGroup = new THREE.Group(); scene.add(trackGroup);
            let scale = 3.5; let pts = []; roadWidth = 100;

            if(currentTrack === 'interlagos') {
                pts = [ new THREE.Vector3(0,30,800), new THREE.Vector3(-300,-10,300), new THREE.Vector3(-600,0,-100), new THREE.Vector3(-800,10,-600), new THREE.Vector3(-200,0,-900), new THREE.Vector3(500,-10,-500), new THREE.Vector3(700,0,100), new THREE.Vector3(300,15,500) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x2e4f3a })); ground.rotation.x = -Math.PI/2; ground.position.y = -50; trackGroup.add(ground);
            } else {
                pts = [ new THREE.Vector3(0,0,1500), new THREE.Vector3(-200,0,500), new THREE.Vector3(-200,0,-800), new THREE.Vector3(0,0,-1500), new THREE.Vector3(400,0,-1500), new THREE.Vector3(500,0,-500), new THREE.Vector3(500,0,800), new THREE.Vector3(300,0,1500) ];
                let ground = new THREE.Mesh(new THREE.PlaneGeometry(60000, 60000), new THREE.MeshLambertMaterial({ color: 0x3a5f2e })); ground.rotation.x = -Math.PI/2; ground.position.y = -5; trackGroup.add(ground);
            }

            pts = pts.map(p => p.multiplyScalar(scale)); trackCurve = new THREE.CatmullRomCurve3(pts, true); logicPoints = trackCurve.getSpacedPoints(1200);

            // 1. O Asfalto (Melhorado para aparência mais lisa)
            const geo = new THREE.BufferGeometry(); const verts = [], indices = [];
            for(let i=0; i<1200; i++) {
                const pt = logicPoints[i]; const t = trackCurve.getTangentAt(i/1200); const n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                verts.push(pt.x + n.x * roadWidth/2, pt.y, pt.z + n.z * roadWidth/2); verts.push(pt.x - n.x * roadWidth/2, pt.y, pt.z - n.z * roadWidth/2);
            }
            for(let i=0; i<1200; i++) { const a = i*2, b = i*2+1, c = ((i+1)%1200)*2, d = ((i+1)%1200)*2+1; indices.push(a,b,d, a,d,c); }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3)); geo.setIndex(indices); geo.computeVertexNormals();
            let roadMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: 0x2a2a2a, side: THREE.DoubleSide, shininess: 30 })); roadMesh.receiveShadow = true; trackGroup.add(roadMesh);

            // 2. As Novas Zebras e Áreas de Escape (Mais visíveis e precisas)
            let kerbGroup = new THREE.Group();
            let runOffGroup = new THREE.Group();
            let isRed = true;
            const matRed = new THREE.MeshStandardMaterial({color: 0xcc0000}); const matWhite = new THREE.MeshStandardMaterial({color: 0xffffff});
            const matGravel = new THREE.MeshStandardMaterial({color: 0xd8b88c, shininess: 10}); // Material para a área de escape
            
            // Usando uma geometria mais plana para zebras mais "fechadas"
            const kerbGeo = new THREE.PlaneGeometry(10, 6);
            const runOffGeo = new THREE.PlaneGeometry(10, 40); // Maior área de escape

            for(let i=0; i<1200; i+=3) {
                let pt = logicPoints[i]; let t = trackCurve.getTangentAt(i/1200); let n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                let tNext = trackCurve.getTangentAt((i+15)%1200/1200); let curve = t.angleTo(tNext);
                
                if(curve > 0.07) { // Zebra na borda interna
                    let mat = isRed ? matRed : matWhite; let kerb = new THREE.Mesh(kerbGeo, mat);
                    let side = (t.clone().cross(tNext).y > 0) ? 1 : -1; 
                    kerb.position.set(pt.x + n.x * (roadWidth/2 + 3) * side, pt.y + 0.5, pt.z + n.z * (roadWidth/2 + 3) * side);
                    kerb.rotation.x = -Math.PI / 2; kerb.rotation.z = Math.atan2(t.x, t.z) + Math.PI/2 * side; kerbGroup.add(kerb); isRed = !isRed;
                }
                
                if(curve > 0.12) { // Área de escape maior nas curvas mais fortes
                    let gravel = new THREE.Mesh(runOffGeo, matGravel); gravel.material.side = THREE.DoubleSide;
                    let side = (t.clone().cross(tNext).y > 0) ? 1 : -1;
                    gravel.position.set(pt.x + n.x * (roadWidth/2 + 25) * side * -1, pt.y + 0.1, pt.z + n.z * (roadWidth/2 + 25) * side * -1);
                    gravel.rotation.x = -Math.PI / 2; gravel.rotation.z = Math.atan2(t.x, t.z) + Math.PI/2 * side * -1; runOffGroup.add(gravel);
                }
            }
            trackGroup.add(kerbGroup);
            trackGroup.add(runOffGroup);

            // 3. Barreiras e Céu (Para ficar mais bonito)
            // Adicionando barreiras de pneus em pontos críticos
            let barrierGroup = new THREE.Group();
            const tyreMat = new THREE.MeshLambertMaterial({ color: 0x111111 }); const redMat = new THREE.MeshLambertMaterial({color: 0xcc0000});
            const tyreGeo = new THREE.CylinderGeometry(5, 5, 12, 12);
            
            for(let i=0; i<1200; i+=30) {
                 let pt = logicPoints[i]; let t = trackCurve.getTangentAt(i/1200); let n = new THREE.Vector3(-t.z, 0, t.x).normalize();
                 let side = 1;
                 
                 // Colocando barreiras mais afastadas da pista
                 for(let j=0; j<3; j++){
                    let mat = (j==1) ? redMat : tyreMat;
                    let tyre = new THREE.Mesh(tyreGeo, mat);
                    tyre.position.set(pt.x + n.x * (roadWidth/2 + 100 + j*10) * side, pt.y + 6, pt.z + n.z * (roadWidth/2 + 100 + j*10) * side);
                    tyre.rotation.y = Math.atan2(t.x, t.z); barrierGroup.add(tyre);
                 }
                 side = -1;
                 for(let j=0; j<3; j++){
                    let mat = (j==1) ? redMat : tyreMat;
                    let tyre = new THREE.Mesh(tyreGeo, mat);
                    tyre.position.set(pt.x + n.x * (roadWidth/2 + 100 + j*10) * side, pt.y + 6, pt.z + n.z * (roadWidth/2 + 100 + j*10) * side);
                    tyre.rotation.y = Math.atan2(t.x, t.z); barrierGroup.add(tyre);
                 }
            }
            trackGroup.add(barrierGroup);

            createTrees();
        }

        // --- SISTEMA DE CARREGAMENTO DO CARRO 3D (Melhorado) ---
        const gltfLoader = new THREE.GLTFLoader();

        function createCarModel(primary, secondary) {
            const group = new THREE.Group();
            const wGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.2, 16); const wMat = new THREE.MeshStandardMaterial({ color: 0x111 });
            const wRL = new THREE.Mesh(wGeo, wMat); wRL.rotation.z = Math.PI/2; wRL.position.set(-3.2, 1.5, -3.5);
            const wRR = new THREE.Mesh(wGeo, wMat); wRR.rotation.z = Math.PI/2; wRR.position.set(3.2, 1.5, -3.5);
            const fL_Pivot = new THREE.Group(); fL_Pivot.position.set(-3.2, 1.5, 5.5); const wFL = new THREE.Mesh(wGeo, wMat); wFL.rotation.z = Math.PI/2; fL_Pivot.add(wFL);
            const fR_Pivot = new THREE.Group(); fR_Pivot.position.set(3.2, 1.5, 5.5); const wFR = new THREE.Mesh(wGeo, wMat); wFR.rotation.z = Math.PI/2; fR_Pivot.add(wFR);
            group.add(wRL, wRR, fL_Pivot, fR_Pivot);

            // Carregando o arquivo 3D
            gltfLoader.load('./assets/carro.glb', function(gltf) {
                const loadedCar = gltf.scene;
                loadedCar.scale.set(3, 3, 3); loadedCar.position.y = 0.5;
                group.add(loadedCar);
                console.log("Carro 3D carregado com sucesso!");
            }, undefined, function(error) {
                console.log("Falha ao carregar o arquivo 'assets/carro.glb'. Verifique se a pasta e o nome do arquivo estão corretos no GitHub.");
                // FALLBACK: Carro de blocos para não travar o jogo
                const bodyMat = new THREE.MeshPhongMaterial({ color: primary }); const wingMat = new THREE.MeshPhongMaterial({ color: secondary }); 
                const chassis = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 10), bodyMat); chassis.position.y = 1.2; 
                const nose = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), bodyMat); nose.position.set(0, 1.0, 7); 
                const fWing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 2), wingMat); fWing.position.set(0, 0.6, 8.5); 
                const rWing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 2), wingMat); rWing.position.set(0, 3.0, -4.5);
                group.add(chassis, nose, fWing, rWing);
            });

            return { group, pivotFL: fL_Pivot, pivotFR: fR_Pivot, wheelFL: wFL, wheelFR: wFR, wheelRL: wRL, wheelRR: wRR };
        }

        let playerCarData, playerCar; let aiCars = [];

        function initCars() {
            if(playerCar) scene.remove(playerCar); aiCars.forEach(ai => scene.remove(ai.mesh)); aiCars = [];
            playerCarData = createCarModel(playerPrimaryColor, playerSecondaryColor); playerCar = playerCarData.group;
            
            const pt = trackCurve.getPointAt(0.960); const tg = trackCurve.getTangentAt(0.960);
            playerCar.position.copy(pt); playerCar.position.y = pt.y + 1.5; playerCar.rotation.y = Math.atan2(tg.x, tg.z); scene.add(playerCar);

            for(let i=0; i<3; i++) { 
                const aiData = createCarModel(0xffffff, 0x111111); 
                let prog = 0.995 - (i * 0.02); if(prog < 0) prog += 1;
                const offset = (i % 2 === 0) ? 10 : -10; 
                const p = trackCurve.getPointAt(prog); const t = trackCurve.getTangentAt(prog);
                aiData.group.position.copy(p).add(new THREE.Vector3(-t.z, 0, t.x).normalize().multiplyScalar(offset)); aiData.group.position.y = p.y + 1.5; aiData.group.rotation.y = Math.atan2(t.x, t.z);
                scene.add(aiData.group); aiCars.push({ data: aiData, mesh: aiData.group, progress: prog, speed: 0.00035, offset: offset });
            }
        }

        // --- SISTEMA DO MINIMAPA (Correção e Layout) ---
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        const minimapScale = 0.035;

        function updateMinimap() {
            minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
            minimapCtx.save();
            minimapCtx.translate(minimapCanvas.width / 2, minimapCanvas.height / 2);
            minimapCtx.scale(minimapScale, -minimapScale); // Corrige a orientação

            // Desenha o layout da pista
            minimapCtx.beginPath();
            minimapCtx.lineWidth = 150; minimapCtx.strokeStyle = '#555';
            for(let i=0; i<logicPoints.length; i++){
                let p = logicPoints[i]; if(i==0) minimapCtx.moveTo(p.x, p.z); else minimapCtx.lineTo(p.x, p.z);
            }
            minimapCtx.closePath(); minimapCtx.stroke();
            
            minimapCtx.beginPath();
            minimapCtx.lineWidth = 80; minimapCtx.strokeStyle = '#222';
            for(let i=0; i<logicPoints.length; i++){
                let p = logicPoints[i]; if(i==0) minimapCtx.moveTo(p.x, p.z); else minimapCtx.lineTo(p.x, p.z);
            }
            minimapCtx.closePath(); minimapCtx.stroke();

            // Desenha o player (Verde)
            minimapCtx.fillStyle = '#0f0'; minimapCtx.beginPath();
            minimapCtx.arc(playerCar.position.x, playerCar.position.z, 60, 0, Math.PI*2); minimapCtx.fill();

            // Desenha a IA (Vermelho)
            minimapCtx.fillStyle = '#f00';
            aiCars.forEach(ai => {
                minimapCtx.beginPath();
                minimapCtx.arc(ai.mesh.position.x, ai.mesh.position.z, 50, 0, Math.PI*2); minimapCtx.fill();
            });
            minimapCtx.restore();
        }

        // --- CONTROLES E LOOP ---
        function selectTrack(btn, t) { document.querySelectorAll('#track-grid .btn-select').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentTrack = t; }
        function selectColor(btn, p, s) { document.querySelectorAll('#team-grid .btn-select').forEach(b => b.classList.remove('active')); btn.classList.add('active'); playerPrimaryColor = p; playerSecondaryColor = s; }
        
        function startCountdown() {
            document.getElementById('garage-menu').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; 
            document.getElementById('minimap-container').style.display = 'block'; document.getElementById('telemetry').style.display = 'block'; 
            buildTrackEnvironment(); initCars(); initAudio(); 
            
            // Adicionando um plano de fundo de céu simples
            scene.background = new THREE.Color(0x99ccff); scene.fog = new THREE.FogExp2(0x99ccff, 0.00007);
            
            gameActive = true; 
            
            // Inicia o tempo da volta
            lapStartTime = Date.now();
            raceStarted = true;
        }

        const keys = {};
        document.addEventListener('keydown', (e) => { keys[e.code] = true; if(e.code==='KeyC') cameraMode = cameraMode === 0 ? 1 : 0; if(e.code==='Space') drsActive = true; });
        document.addEventListener('keyup', (e) => { keys[e.code] = false; if(e.code==='Space') { drsActive = false; document.getElementById('drs-indicator').classList.remove('drs-active'); }});

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) { renderer.render(scene, camera); return; }
            updateEngineSound();

            if (raceStarted) {
                let angle = playerCar.rotation.y;
                if(drsActive) document.getElementById('drs-indicator').classList.add('drs-active');
                
                // Atualiza o tempo na tela
                let currentTime = (Date.now() - lapStartTime) / 1000;
                document.getElementById('current-time').innerText = currentTime.toFixed(2);
                
                aiCars.forEach(ai => {
                    ai.progress += ai.speed; if(ai.progress > 1) ai.progress -= 1; 
                    const pt = trackCurve.getPointAt(ai.progress); const t = trackCurve.getTangentAt(ai.progress); 
                    ai.mesh.position.copy(pt).add(new THREE.Vector3(-t.z, 0, t.x).normalize().multiplyScalar(ai.offset)); ai.mesh.position.y = pt.y + 1.5; ai.mesh.rotation.y = Math.atan2(t.x, t.z);
                    ai.data.wheelFL.rotation.x += ai.speed * 1000; ai.data.wheelFR.rotation.x += ai.speed * 1000; ai.data.wheelRL.rotation.x += ai.speed * 1000; ai.data.wheelRR.rotation.x += ai.speed * 1000;
                });

                if (keys['ArrowUp'] || keys['KeyW']) speed += drsActive ? 0.32 : 0.25; 
                if (keys['ArrowDown'] || keys['KeyS']) speed -= 0.30; 
                if (keys['ArrowLeft'] || keys['KeyA']) targetSteering = 1; else if (keys['ArrowRight'] || keys['KeyD']) targetSteering = -1; else targetSteering = 0;
                
                steering += (targetSteering - steering) * 0.12; 
                playerCarData.pivotFL.rotation.y = steering * 0.4; playerCarData.pivotFR.rotation.y = steering * 0.4;
                
                speed *= drsActive ? 0.99 : 0.98; speed = Math.max(-3, Math.min(drsActive ? 15 : 12, speed)); 
                if(Math.abs(speed) > 0.1) angle += steering * 0.024 * (speed > 0 ? 1 : -1);
                
                let rot = speed * 0.3; playerCarData.wheelFL.rotation.x += rot; playerCarData.wheelFR.rotation.x += rot; playerCarData.wheelRL.rotation.x += rot; playerCarData.wheelRR.rotation.x += rot;
                document.getElementById('speed-display').innerText = Math.abs(Math.floor(speed * 25)) + ' km/h';

                let nextX = playerCar.position.x + Math.sin(angle) * speed; let nextZ = playerCar.position.z + Math.cos(angle) * speed;
                let minDist = Infinity, closestIdx = 0;
                for(let i=0; i<logicPoints.length; i+=5) { let dx=logicPoints[i].x-nextX, dz=logicPoints[i].z-nextZ, sq=dx*dx+dz*dz; if(sq<minDist){ minDist=sq; closestIdx=i; } }
                
                // --- FÍSICA DO LIMITE DE PISTA E ÁREA DE ESCAPE ---
                let distToCenter = Math.sqrt(minDist);
                let offTrackWarning = document.getElementById('off-track-warning');
                
                if (distToCenter > roadWidth / 2) { 
                    offTrackWarning.style.display = 'block';
                    
                    if(distToCenter > roadWidth / 2 + 10 && distToCenter < roadWidth / 2 + 40){
                        // Área de Escape: Perde velocidade, mas menos que na grama
                        speed *= 0.95; camera.position.y += (Math.random() - 0.5) * 0.8;
                    } else {
                        // Grama: Perde muita velocidade e treme muito
                        speed *= 0.88; camera.position.y += (Math.random() - 0.5) * 1.8;
                    }
                } else {
                    offTrackWarning.style.display = 'none';
                }

                // --- LÓGICA DE VOLTA COMPLETA (LINHA DE CHEGADA) ---
                if (closestIdx < 10 && speed > 2) { // Passou pela linha de chegada (início)
                    // Você pode adicionar um check extra para garantir que ele não cortou a pista
                    let lapCompleteMsg = document.getElementById('lap-complete-msg');
                    lapCompleteMsg.style.display = 'block';
                    setTimeout(() => lapCompleteMsg.style.display = 'none', 3000); // Esconde a mensagem após 3 segundos
                    lapStartTime = Date.now(); // Reinicia o tempo
                    console.log(`Volta completa em ${currentTime.toFixed(2)} segundos!`);
                }

                playerCar.position.set(nextX, logicPoints[closestIdx].y + 1.5, nextZ); playerCar.rotation.y = angle;
                let pTan = trackCurve.getTangentAt(closestIdx/1200); playerCar.rotation.x = -Math.atan2(pTan.y, Math.sqrt(pTan.x*pTan.x + pTan.z*pTan.z));
            
                // Atualiza o radar
                updateMinimap();
            }

            if (cameraMode === 1) { 
                camera.position.copy(new THREE.Vector3(0, 4, 0).applyMatrix4(playerCar.matrixWorld)); camera.lookAt(new THREE.Vector3(0, 1.8, 50).applyMatrix4(playerCar.matrixWorld));
            } else { 
                camera.position.lerp(new THREE.Vector3(0, 15, -45).applyMatrix4(new THREE.Matrix4().makeRotationY(playerCar.rotation.y)).add(playerCar.position), 0.2); camera.lookAt(playerCar.position);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
