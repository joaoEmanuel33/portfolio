<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Coder | GP Híbrido</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Inter', sans-serif; background: #87CEEB; }

        #game-ui { position: absolute; top: 20px; left: 20px; color: #fff; font-family: 'Orbitron', sans-serif; z-index: 10; text-shadow: 0 0 10px #000; }
        .timer-box { font-size: 2rem; margin-bottom: 5px; }
        .target-time { color: #ffeb3b; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        #instructions { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; text-shadow: 0 2px 5px #000; pointer-events: none; }
        #skip-btn { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(0, 0, 0, 0.5); border: 1px solid #fff; color: #fff; padding: 10px 20px; font-family: 'Orbitron', sans-serif; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        #skip-btn:hover { background: #fff; color: #000; }

        #portfolio-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(10px); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: flex-start; padding: 60px 20px; overflow-y: auto; color: #fff; animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .success-message { font-family: 'Orbitron', sans-serif; color: #0ff; font-size: 1.5rem; margin-bottom: 30px; text-shadow: 0 0 15px #0ff; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="timer-box">Volta: <span id="current-time">0.00</span>s</div>
        <div class="target-time">Meta: Bater 100.00s | Alcance o Max!</div>
    </div>
    <button id="skip-btn" onclick="openPortfolio('ACESSO LIBERADO (MODO DESENVOLVEDOR)')">Pular Desafio</button>
    <div id="instructions">Setas ou WASD para pilotar. Cuidado com o tráfego!</div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const TARGET_TIME = 100.00;
        let gameActive = true;
        let lapStartTime = Date.now();
        let isFirstLap = true;
        let nearEnd = false;

        const timeDisplay = document.getElementById('current-time');
        const portfolioOverlay = document.getElementById('portfolio-overlay');

        // --- SETUP 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0001); // Neblina mais fraca para ver mais longe

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 20000);
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(500, 1000, 500);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -4000;
        dirLight.shadow.camera.right = 4000;
        dirLight.shadow.camera.top = 4000;
        dirLight.shadow.camera.bottom = -4000;
        scene.add(dirLight);

        // --- GRAMA ---
        const groundGeo = new THREE.PlaneGeometry(50000, 50000);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d4c1e }); 
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- CIRCUITO ---
        const scale = 3.2; 
        const trackCurve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0, 900 * scale),             
            new THREE.Vector3(-300 * scale, 0, 400 * scale),  
            new THREE.Vector3(-100 * scale, 0, 100 * scale),  
            new THREE.Vector3(-500 * scale, 0, -200 * scale), 
            new THREE.Vector3(-900 * scale, 0, -600 * scale), 
            new THREE.Vector3(-400 * scale, 0, -1000 * scale),
            new THREE.Vector3(300 * scale, 0, -800 * scale),  
            new THREE.Vector3(800 * scale, 0, -400 * scale),  
            new THREE.Vector3(400 * scale, 0, -100 * scale),  
            new THREE.Vector3(800 * scale, 0, 150 * scale),   
            new THREE.Vector3(300 * scale, 0, 350 * scale),   
            new THREE.Vector3(300 * scale, 0, 800 * scale)    
        ], true);

        const roadWidth = 70; 
        const roadGeo = new THREE.TubeGeometry(trackCurve, 1000, roadWidth, 8, true);
        roadGeo.scale(1, 0.02, 1);
        const roadMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.position.y = 0.5;
        road.receiveShadow = true;
        scene.add(road);

        // --- ARQUIBANCADA & PITLANE ---
        // Pitlane (Concreto à direita da reta principal)
        const pitlaneGeo = new THREE.PlaneGeometry(40, 800);
        const pitlaneMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
        const pitlane = new THREE.Mesh(pitlaneGeo, pitlaneMat);
        pitlane.rotation.x = -Math.PI / 2;
        pitlane.position.set(roadWidth + 30, 0.6, 900 * scale); // Ao lado da reta
        pitlane.receiveShadow = true;
        scene.add(pitlane);

        // Muro do Pitlane
        const wallGeo = new THREE.BoxGeometry(5, 4, 800);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(roadWidth + 5, 2, 900 * scale);
        wall.castShadow = true;
        scene.add(wall);

        // Arquibancada Gigante (À esquerda da reta principal)
        const grandStandGroup = new THREE.Group();
        grandStandGroup.position.set(-(roadWidth + 40), 0, 900 * scale);
        
        for(let i=0; i<5; i++) {
            const stepGeo = new THREE.BoxGeometry(20, (i+1)*5, 600);
            const stepMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
            const step = new THREE.Mesh(stepGeo, stepMat);
            step.position.set(-i*20, (i+1)*2.5, 0);
            step.castShadow = true;
            grandStandGroup.add(step);
            
            // Adicionando a plateia (pontos coloridos)
            for(let j=0; j<80; j++) {
                const person = new THREE.Mesh(
                    new THREE.BoxGeometry(2, 2, 2),
                    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
                );
                person.position.set(-i*20, (i+1)*5 + 1, -280 + Math.random() * 560);
                grandStandGroup.add(person);
            }
        }
        scene.add(grandStandGroup);

        // --- LINHA DE CHEGADA ---
        const startLine = new THREE.Mesh(
            new THREE.PlaneGeometry(roadWidth * 2.2, 25), 
            new THREE.MeshBasicMaterial({color: 0xffffff})
        );
        startLine.rotation.x = -Math.PI / 2;
        startLine.position.copy(trackCurve.getPointAt(0));
        startLine.position.y = 0.7; 
        scene.add(startLine);

        // --- FUNÇÃO PARA CONSTRUIR CARROS ---
        function createCarModel(primaryColor) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: primaryColor });
            const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

            const chassis = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 8), bodyMat); chassis.position.y = 1; chassis.castShadow = true;
            const nose = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 3), bodyMat); nose.position.set(0, 0.9, 5.5); nose.castShadow = true;
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3), blackMat); cockpit.position.set(0, 1.8, -1); cockpit.castShadow = true;
            const fWing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 1.5), blackMat); fWing.position.set(0, 0.6, 6.5); fWing.castShadow = true;
            const rWing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 1.5), blackMat); rWing.position.set(0, 2.5, -3.5); rWing.castShadow = true;
            
            const wGeo = new THREE.CylinderGeometry(1.2, 1.2, 1, 16);
            const wMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wRL = new THREE.Mesh(wGeo, wMat); wRL.rotation.z = Math.PI/2; wRL.position.set(-2.5, 1.2, -3); wRL.castShadow = true;
            const wRR = new THREE.Mesh(wGeo, wMat); wRR.rotation.z = Math.PI/2; wRR.position.set(2.5, 1.2, -3); wRR.castShadow = true;
            
            // Rodas da frente separadas para virar (somente no carro do player, IAs vão fixas pra economizar processamento)
            const fL = new THREE.Group(); fL.position.set(-2.5, 1.2, 4.5);
            const wFL = new THREE.Mesh(wGeo, wMat); wFL.rotation.z = Math.PI/2; wFL.castShadow = true; fL.add(wFL);
            
            const fR = new THREE.Group(); fR.position.set(2.5, 1.2, 4.5);
            const wFR = new THREE.Mesh(wGeo, wMat); wFR.rotation.z = Math.PI/2; wFR.castShadow = true; fR.add(wFR);

            group.add(chassis, nose, cockpit, fWing, rWing, wRL, wRR, fL, fR);
            return { group, frontLeft: fL, frontRight: fR };
        }

        // --- CRIANDO O JOGADOR (VERMELHO) ---
        const playerCarData = createCarModel(0xcc0000); // Ferrari style
        const playerCar = playerCarData.group;
        playerCar.position.copy(trackCurve.getPointAt(0.98)); // Jogador larga um pouco atrás
        playerCar.position.y = 0.5;
        scene.add(playerCar);

        // --- CRIANDO OS OPONENTES (IA) ---
        const aiCars = [];
        const colors = [0x00008b, 0x00ff00, 0xffa500, 0xffffff, 0x800080, 0x00ffff, 0xff1493, 0xffff00, 0xa52a2a, 0x808080];
        
        for(let i=0; i<10; i++) {
            // O primeiro oponente (index 0) será o Verstappen (Azul escuro), larga na frente
            const isMax = (i === 0);
            const carColor = isMax ? 0x00008b : colors[i]; 
            const aiData = createCarModel(carColor);
            const aiCar = aiData.group;
            
            // Distribui eles no grid de largada
            let startProgress = 0.995 - (i * 0.005); 
            if(startProgress < 0) startProgress += 1;
            
            // Offset lateral para não largarem batendo
            const offsetLateral = (i % 2 === 0) ? 15 : -15; 
            
            const pt = trackCurve.getPointAt(startProgress);
            const tangent = trackCurve.getTangentAt(startProgress);
            const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            
            aiCar.position.copy(pt).add(normal.multiplyScalar(offsetLateral));
            aiCar.position.y = 0.5;
            scene.add(aiCar);

            aiCars.push({
                mesh: aiCar,
                progress: startProgress,
                speed: isMax ? 0.00085 : (0.00075 + Math.random() * 0.00008), // Max é mais rápido
                offset: offsetLateral
            });
        }

        // --- FÍSICA DO JOGADOR ---
        let speed = 0, steering = 0, angle = Math.atan2(trackCurve.getTangentAt(0).x, trackCurve.getTangentAt(0).z);
        playerCar.rotation.y = angle;

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const logicPoints = trackCurve.getSpacedPoints(1000);

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            // 1. ATUALIZA OS OPONENTES (IA)
            aiCars.forEach(ai => {
                ai.progress += ai.speed;
                if(ai.progress > 1) ai.progress -= 1; // Volta a zero ao completar a volta
                
                const pt = trackCurve.getPointAt(ai.progress);
                const tangent = trackCurve.getTangentAt(ai.progress);
                const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
                
                // Suaviza a IA fazendo as curvas e mantendo a rotação
                ai.mesh.position.copy(pt).add(normal.multiplyScalar(ai.offset));
                ai.mesh.rotation.y = Math.atan2(tangent.x, tangent.z);
            });

            // 2. ATUALIZA O JOGADOR
            let acceleration = 0;
            if (keys['ArrowUp'] || keys['KeyW']) acceleration = 0.16; 
            if (keys['ArrowDown'] || keys['KeyS']) acceleration = -0.15; 
            
            if (keys['ArrowLeft'] || keys['KeyA']) steering = 1;
            else if (keys['ArrowRight'] || keys['KeyD']) steering = -1;
            else steering = 0;

            const maxTurnAngle = 0.45;
            playerCarData.frontLeft.rotation.y = steering * maxTurnAngle;
            playerCarData.frontRight.rotation.y = steering * maxTurnAngle;

            speed += acceleration;
            speed *= 0.985; 
            speed = Math.max(-2, Math.min(10.8, speed)); // Top speed

            if(Math.abs(speed) > 0.1) {
                angle += steering * 0.035 * (speed > 0 ? 1 : -1);
            }

            let nextX = playerCar.position.x + Math.sin(angle) * speed;
            let nextZ = playerCar.position.z + Math.cos(angle) * speed;

            let minSquareDist = Infinity;
            let closestIndex = 0;
            for(let i = 0; i < logicPoints.length; i++) {
                let dx = logicPoints[i].x - nextX;
                let dz = logicPoints[i].z - nextZ;
                let sq = dx*dx + dz*dz;
                if(sq < minSquareDist) {
                    minSquareDist = sq;
                    closestIndex = i;
                }
            }

            let distToCenter = Math.sqrt(minSquareDist);

            if (distToCenter > roadWidth + 8) {
                speed *= -0.5; // Bateu na grama
            } else {
                playerCar.position.x = nextX;
                playerCar.position.z = nextZ;
            }
            playerCar.rotation.y = angle;

            // 3. ATUALIZA A CÂMERA
            const relativeOffset = new THREE.Vector3(0, 20, -50);
            const cameraOffset = relativeOffset.applyMatrix4(playerCar.matrixWorld);
            camera.position.lerp(cameraOffset, 0.15);
            camera.lookAt(playerCar.position);

            // 4. LÓGICA DE VOLTA E CRONÔMETRO
            let currentTime = (Date.now() - lapStartTime) / 1000;
            if(!isFirstLap) timeDisplay.textContent = currentTime.toFixed(2);

            if (closestIndex > 980) nearEnd = true;
            
            if (nearEnd && closestIndex < 20 && distToCenter < roadWidth) {
                if (!isFirstLap) {
                    if (currentTime <= TARGET_TIME) {
                        openPortfolio(`TEMPO BATIDO: ${currentTime.toFixed(2)}s! ACESSO CONCEDIDO.`);
                    } else {
                        timeDisplay.style.color = "#ff0000";
                        setTimeout(() => timeDisplay.style.color = "#fff", 1000);
                    }
                }
                isFirstLap = false; lapStartTime = Date.now();
                nearEnd = false;
            }

            renderer.render(scene, camera);
        }

        function openPortfolio(msg) {
            gameActive = false;
            document.getElementById('win-message').innerText = msg;
            portfolioOverlay.style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'none';
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
