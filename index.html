<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Coder | O Desafio do Portfólio</title>
    <style>
        /* --- RESET E FONTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Inter', sans-serif; background: #87CEEB; }

        /* --- UI DO JOGO --- */
        #game-ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            font-family: 'Orbitron', sans-serif; z-index: 10;
            text-shadow: 0 0 10px #000;
        }
        .timer-box { font-size: 2rem; margin-bottom: 5px; }
        .target-time { color: #ffeb3b; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        
        #instructions {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            text-shadow: 0 2px 5px #000; pointer-events: none;
        }

        #skip-btn {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #fff;
            color: #fff; padding: 10px 20px; font-family: 'Orbitron', sans-serif;
            cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        #skip-btn:hover { background: #fff; color: #000; }

        /* --- OVERLAY DO PORTFÓLIO --- */
        #portfolio-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(10px);
            z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 60px 20px; overflow-y: auto; color: #fff;
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .success-message {
            font-family: 'Orbitron', sans-serif; color: #0ff; font-size: 1.5rem;
            margin-bottom: 30px; text-shadow: 0 0 15px #0ff; letter-spacing: 2px;
        }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 3rem; margin-bottom: 10px; }
        header p { color: #aaa; font-size: 1.2rem; }

        .skills-container { display: flex; gap: 30px; margin-bottom: 60px; flex-wrap: wrap; justify-content: center; }
        .skill-card {
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 8px;
            border: 1px solid #333; width: 300px; text-align: center;
        }
        .skill-card h3 { font-size: 1.8rem; margin-bottom: 15px; }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 950px; }
        .project-card {
            background: #111; height: 160px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px;
            border: 1px solid #333; font-weight: 600; transition: 0.3s;
        }
        .project-card:hover { border-color: #0ff; background: #1a1a1a; transform: translateY(-5px); }
    </style>
</head>
<body>

    <div id="game-ui">
        <div class="timer-box">Volta: <span id="current-time">0.00</span>s</div>
        <div class="target-time">Meta: Bater 90.00s</div>
    </div>
    <button id="skip-btn" onclick="openPortfolio('ACESSO LIBERADO (MODO DESENVOLVEDOR)')">Pular Desafio</button>
    <div id="instructions">Setas ou WASD para pilotar. Atenção na chicane!</div>

    <canvas id="game-canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const TARGET_TIME = 90.00;
        let gameActive = true;
        let lapStartTime = Date.now();
        let isFirstLap = true;
        let nearEnd = false;

        const timeDisplay = document.getElementById('current-time');
        const portfolioOverlay = document.getElementById('portfolio-overlay');

        // --- SETUP 3D COM SOMBRAS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.0003); // Nevoeiro mais leve pra ver mais longe

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 8000);
        
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(500, 1000, 500);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -2000;
        dirLight.shadow.camera.right = 2000;
        dirLight.shadow.camera.top = 2000;
        dirLight.shadow.camera.bottom = -2000;
        scene.add(dirLight);

        // --- O CENÁRIO (GRAMA) ---
        const groundGeo = new THREE.PlaneGeometry(20000, 20000);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d4c1e }); 
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- O CIRCUITO (MAIOR) ---
        const scale = 2.5; // Fator de aumento da pista
        const trackCurve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0, 500 * scale),      
            new THREE.Vector3(500 * scale, 0, 500 * scale),    
            new THREE.Vector3(900 * scale, 0, 100 * scale),    
            new THREE.Vector3(400 * scale, 0, -300 * scale),   
            new THREE.Vector3(0, 0, -100 * scale),     
            new THREE.Vector3(-100 * scale, 0, -250 * scale),  
            new THREE.Vector3(0, 0, -400 * scale),     
            new THREE.Vector3(-300 * scale, 0, -600 * scale),  
            new THREE.Vector3(-800 * scale, 0, -200 * scale),  
            new THREE.Vector3(-700 * scale, 0, 400 * scale),   
            new THREE.Vector3(-300 * scale, 0, 500 * scale)    
        ], true);

        const roadWidth = 60; // Raio do tubo da pista
        const roadGeo = new THREE.TubeGeometry(trackCurve, 500, roadWidth, 8, true);
        roadGeo.scale(1, 0.02, 1);
        const roadMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.position.y = 0.5; // Altura da pista
        road.receiveShadow = true;
        scene.add(road);

        // Zebras Laterais
        const curbWidth = 68;
        const curbGeo = new THREE.TubeGeometry(trackCurve, 500, curbWidth, 8, true);
        curbGeo.scale(1, 0.015, 1);
        
        const curbCanvas = document.createElement('canvas');
        curbCanvas.width = 128; curbCanvas.height = 128;
        const cCtx = curbCanvas.getContext('2d');
        cCtx.fillStyle = '#ff0000'; cCtx.fillRect(0,0,128,128);
        cCtx.fillStyle = '#ffffff'; cCtx.fillRect(0,0,64,128);
        const curbTex = new THREE.CanvasTexture(curbCanvas);
        curbTex.wrapS = THREE.RepeatWrapping; curbTex.wrapT = THREE.RepeatWrapping;
        curbTex.repeat.set(500, 1);

        const curbMat = new THREE.MeshLambertMaterial({ map: curbTex });
        const curb = new THREE.Mesh(curbGeo, curbMat);
        curb.position.y = 0.45;
        curb.receiveShadow = true;
        scene.add(curb);

        // LINHA DE CHEGADA (CORRIGIDA)
        const startLine = new THREE.Mesh(
            new THREE.PlaneGeometry(roadWidth * 2.2, 15), 
            new THREE.MeshBasicMaterial({color: 0xffffff})
        );
        startLine.rotation.x = -Math.PI / 2;
        startLine.position.copy(trackCurve.getPointAt(0));
        startLine.position.y = 0.7; // Acima da pista para não conflitar as texturas
        scene.add(startLine);

        // --- SAUSAGE CURBS (FORA DA PISTA) ---
        const sausages = [];
        const sausageGeo = new THREE.CylinderGeometry(2.5, 2.5, 14, 12);
        const sausageMat = new THREE.MeshLambertMaterial({ color: 0xffd700 }); 
        
        const chicanePoints = [0.42, 0.45, 0.48]; 
        chicanePoints.forEach((u, index) => {
            const point = trackCurve.getPointAt(u);
            const tangent = trackCurve.getTangentAt(u);
            const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            
            const sausage = new THREE.Mesh(sausageGeo, sausageMat);
            sausage.rotation.z = Math.PI / 2; 
            
            const side = index % 2 === 0 ? 1 : -1;
            // Deslocando para as bordas (roadWidth + 5 garante que ficam no limite da pista)
            sausage.position.copy(point).add(normal.multiplyScalar(side * (roadWidth + 5)));
            sausage.position.y = 1.5; 
            sausage.castShadow = true;
            sausages.push(sausage);
            scene.add(sausage);
        });

        const logicPoints = trackCurve.getSpacedPoints(600);

        // --- O CARRO F1 ---
        const carGroup = new THREE.Group();
        const redMat = new THREE.MeshPhongMaterial({ color: 0xcc0000 });
        const blackMat = new THREE.MeshPhongMaterial({ color: 0x111111 });

        const chassis = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 8), redMat); chassis.position.y = 1;
        const nose = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 3), redMat); nose.position.set(0, 0.9, 5.5);
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3), blackMat); cockpit.position.set(0, 1.8, -1);
        const frontWing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 1.5), blackMat); frontWing.position.set(0, 0.6, 6.5);
        const rearWing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 1.5), blackMat); rearWing.position.set(0, 2.5, -3.5);
        
        chassis.castShadow = true; nose.castShadow = true; cockpit.castShadow = true; 
        frontWing.castShadow = true; rearWing.castShadow = true;

        carGroup.add(chassis, nose, cockpit, frontWing, rearWing);

        // RODAS - Sistema separado para animação
        const wheelGeo = new THREE.CylinderGeometry(1.2, 1.2, 1, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        
        // Rodas Traseiras (Fixas)
        const wheelRL = new THREE.Mesh(wheelGeo, wheelMat); wheelRL.rotation.z = Math.PI/2; wheelRL.position.set(-2.5, 1.2, -3); wheelRL.castShadow = true; carGroup.add(wheelRL);
        const wheelRR = new THREE.Mesh(wheelGeo, wheelMat); wheelRR.rotation.z = Math.PI/2; wheelRR.position.set(2.5, 1.2, -3); wheelRR.castShadow = true; carGroup.add(wheelRR);

        // Rodas Dianteiras (Articuladas)
        const frontLeftGroup = new THREE.Group(); frontLeftGroup.position.set(-2.5, 1.2, 4.5);
        const wheelFL = new THREE.Mesh(wheelGeo, wheelMat); wheelFL.rotation.z = Math.PI/2; wheelFL.castShadow = true; frontLeftGroup.add(wheelFL);
        carGroup.add(frontLeftGroup);

        const frontRightGroup = new THREE.Group(); frontRightGroup.position.set(2.5, 1.2, 4.5);
        const wheelFR = new THREE.Mesh(wheelGeo, wheelMat); wheelFR.rotation.z = Math.PI/2; wheelFR.castShadow = true; frontRightGroup.add(wheelFR);
        carGroup.add(frontRightGroup);

        carGroup.position.copy(logicPoints[0]);
        // Colocando o carro na altura correta para não afundar (Y = 0.5 da pista)
        carGroup.position.y = 0.5; 

        const startTangent = trackCurve.getTangentAt(0);
        let angle = Math.atan2(startTangent.x, startTangent.z);
        carGroup.rotation.y = angle;
        
        scene.add(carGroup);

        // --- FÍSICA E CONTROLES ---
        let speed = 0, steering = 0, verticalVelocity = 0;
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            let acceleration = 0;
            // Aceleração e Velocidade reduzidas
            if (keys['ArrowUp'] || keys['KeyW']) acceleration = 0.12; 
            if (keys['ArrowDown'] || keys['KeyS']) acceleration = -0.08; 
            
            if (keys['ArrowLeft'] || keys['KeyA']) steering = 1;
            else if (keys['ArrowRight'] || keys['KeyD']) steering = -1;
            else steering = 0;

            // Animação das Rodas Dianteiras
            const maxTurnAngle = 0.5; // Radianos
            frontLeftGroup.rotation.y = steering * maxTurnAngle;
            frontRightGroup.rotation.y = steering * maxTurnAngle;

            speed += acceleration;
            speed *= 0.985; // Atrito
            speed = Math.max(-2, Math.min(8.5, speed)); // Limitador de velocidade mais realista

            if(Math.abs(speed) > 0.1) {
                angle += steering * 0.030 * (speed > 0 ? 1 : -1);
            }

            let nextX = carGroup.position.x + Math.sin(angle) * speed;
            let nextZ = carGroup.position.z + Math.cos(angle) * speed;

            let minSquareDist = Infinity;
            let closestIndex = 0;
            for(let i = 0; i < logicPoints.length; i++) {
                let dx = logicPoints[i].x - nextX;
                let dz = logicPoints[i].z - nextZ;
                let sq = dx*dx + dz*dz;
                if(sq < minSquareDist) {
                    minSquareDist = sq;
                    closestIndex = i;
                }
            }

            let distToCenter = Math.sqrt(minSquareDist);

            if (distToCenter > roadWidth + 8) {
                speed *= -0.5; // Grama / Barreira invisível
            } else {
                carGroup.position.x = nextX;
                carGroup.position.z = nextZ;
            }
            carGroup.rotation.y = angle;

            // Pulo nas Salsichas
            sausages.forEach(sau => {
                if (carGroup.position.distanceTo(sau.position) < 18) {
                    verticalVelocity = 1.8; 
                    speed *= 0.9; 
                }
            });

            // Gravidade ajustada para o limite da pista
            carGroup.position.y += verticalVelocity;
            if (carGroup.position.y > 0.5) {
                verticalVelocity -= 0.15; 
            }
            if (carGroup.position.y <= 0.5) {
                carGroup.position.y = 0.5;
                verticalVelocity = 0;
            }

            // Câmera um pouco mais distante para acomodar a proporção da pista
            const relativeOffset = new THREE.Vector3(0, 20, -50);
            const cameraOffset = relativeOffset.applyMatrix4(carGroup.matrixWorld);
            camera.position.lerp(cameraOffset, 0.15);
            camera.lookAt(carGroup.position);

            let currentTime = (Date.now() - lapStartTime) / 1000;
            if(!isFirstLap) timeDisplay.textContent = currentTime.toFixed(2);

            if (closestIndex > 580) nearEnd = true;
            
            if (nearEnd && closestIndex < 20 && distToCenter < roadWidth) {
                if (!isFirstLap) {
                    if (currentTime <= TARGET_TIME) {
                        openPortfolio(`TEMPO BATIDO: ${currentTime.toFixed(2)}s! ACESSO CONCEDIDO.`);
                    } else {
                        timeDisplay.style.color = "#ff0000";
                        setTimeout(() => timeDisplay.style.color = "#fff", 1000);
                    }
                }
                isFirstLap = false; lapStartTime = Date.now();
                nearEnd = false;
            }

            renderer.render(scene, camera);
        }

        function openPortfolio(msg) {
            gameActive = false;
            document.getElementById('win-message').innerText = msg;
            portfolioOverlay.style.display = 'flex';
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('instructions').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'none';
        }

        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
